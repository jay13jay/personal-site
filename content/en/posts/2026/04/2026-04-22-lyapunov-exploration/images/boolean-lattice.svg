<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="nodeActive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <linearGradient id="nodeGoal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#f85149"/>
    </linearGradient>
    <linearGradient id="nodeStart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Boolean Lattice: Coverage States for n = 3 Properties</text>
  <text x="360" y="58" text-anchor="middle" fill="#8b949e" font-size="12">Every path from ☐☐☐ to ☑☑☑ passes through at most 3 advancing steps</text>

  <!-- Edges (drawn first, behind nodes) -->
  <g stroke="#30363d" stroke-width="1.5" fill="none">
    <!-- Layer 0→1 -->
    <line x1="360" y1="120" x2="180" y2="210"/>
    <line x1="360" y1="120" x2="360" y2="210"/>
    <line x1="360" y1="120" x2="540" y2="210"/>
    <!-- Layer 1→2 -->
    <line x1="180" y1="210" x2="120" y2="310"/>
    <line x1="180" y1="210" x2="360" y2="310"/>
    <line x1="360" y1="210" x2="120" y2="310"/>
    <line x1="360" y1="210" x2="600" y2="310"/>
    <line x1="540" y1="210" x2="360" y2="310"/>
    <line x1="540" y1="210" x2="600" y2="310"/>
    <!-- Layer 2→3 -->
    <line x1="120" y1="310" x2="360" y2="410"/>
    <line x1="360" y1="310" x2="360" y2="410"/>
    <line x1="600" y1="310" x2="360" y2="410"/>
  </g>

  <!-- Highlighted path edges (one example path) -->
  <g stroke="#f8514980" stroke-width="3" fill="none" stroke-dasharray="6,3">
    <line x1="360" y1="120" x2="180" y2="210"/>
    <line x1="180" y1="210" x2="360" y2="310"/>
    <line x1="360" y1="310" x2="360" y2="410"/>
  </g>

  <!-- Layer 0: 000 -->
  <g filter="url(#glow)">
    <circle cx="360" cy="105" r="22" fill="url(#nodeStart)" stroke="#388bfd" stroke-width="2"/>
    <text x="360" y="110" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">000</text>
  </g>

  <!-- Layer 1: 001, 010, 100 -->
  <g>
    <circle cx="180" cy="210" r="20" fill="#21262d" stroke="#3fb950" stroke-width="2"/>
    <text x="180" y="215" text-anchor="middle" fill="#e6edf3" font-size="11">100</text>

    <circle cx="360" cy="210" r="20" fill="#21262d" stroke="#30363d" stroke-width="2"/>
    <text x="360" y="215" text-anchor="middle" fill="#8b949e" font-size="11">010</text>

    <circle cx="540" cy="210" r="20" fill="#21262d" stroke="#30363d" stroke-width="2"/>
    <text x="540" y="215" text-anchor="middle" fill="#8b949e" font-size="11">001</text>
  </g>

  <!-- Layer 2: 110, 101, 011 -->
  <g>
    <circle cx="120" cy="310" r="20" fill="#21262d" stroke="#30363d" stroke-width="2"/>
    <text x="120" y="315" text-anchor="middle" fill="#8b949e" font-size="11">110</text>

    <circle cx="360" cy="310" r="20" fill="#21262d" stroke="#3fb950" stroke-width="2"/>
    <text x="360" y="315" text-anchor="middle" fill="#e6edf3" font-size="11">101</text>

    <circle cx="600" cy="310" r="20" fill="#21262d" stroke="#30363d" stroke-width="2"/>
    <text x="600" y="315" text-anchor="middle" fill="#8b949e" font-size="11">011</text>
  </g>

  <!-- Layer 3: 111 (goal) -->
  <g filter="url(#glow)">
    <circle cx="360" cy="410" r="24" fill="url(#nodeGoal)" stroke="#f85149" stroke-width="2"/>
    <text x="360" y="415" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">111</text>
  </g>

  <!-- Annotations -->
  <text x="660" y="108" text-anchor="end" fill="#388bfd" font-size="11">w = 0</text>
  <text x="660" y="213" text-anchor="end" fill="#8b949e" font-size="11">w = 1</text>
  <text x="660" y="313" text-anchor="end" fill="#8b949e" font-size="11">w = 2</text>
  <text x="660" y="413" text-anchor="end" fill="#f85149" font-size="11">w = 3</text>

  <text x="75" y="108" fill="#388bfd" font-size="11">Start</text>
  <text x="75" y="413" fill="#f85149" font-size="11">Goal ☑☑☑</text>

  <!-- Legend -->
  <g transform="translate(30, 460)">
    <line x1="0" y1="5" x2="30" y2="5" stroke="#f8514980" stroke-width="3" stroke-dasharray="6,3"/>
    <text x="38" y="9" fill="#8b949e" font-size="11">Example path (000 → 100 → 101 → 111) — exactly 3 steps</text>
  </g>
  <g transform="translate(30, 482)">
    <text x="0" y="9" fill="#8b949e" font-size="11">w = Hamming weight (number of covered properties). Edges only go ↓ (monotonic).</text>
  </g>
  <g transform="translate(30, 502)">
    <text x="0" y="9" fill="#8b949e" font-size="11">For n = 8 (ASAM), this lattice has 2⁸ = 256 states. Structure is identical.</text>
  </g>
</svg>
