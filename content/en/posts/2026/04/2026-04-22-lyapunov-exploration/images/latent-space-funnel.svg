<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="300" fill="#011627" rx="10"/>
  
  <!-- Left: Chaos -->
  <text x="100" y="40" fill="#f5f9ff" font-family="sans-serif" font-size="14" text-anchor="middle" opacity="0.6">High-Dimensional Chaos</text>
  <g opacity="0.4">
    <circle cx="80" cy="150" r="2" fill="#0097c4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="120" r="2" fill="#ff9f1c"/>
    <circle cx="150" cy="180" r="2" fill="#0097c4"/>
    <circle cx="60" cy="190" r="2" fill="#ff9f1c"/>
    <circle cx="100" cy="220" r="2" fill="#0097c4"/>
    <path d="M50,100 L150,250 M50,250 L150,100" stroke="#0097c4" stroke-width="0.5" opacity="0.2"/>
  </g>
  
  <!-- Funnel -->
  <path d="M200,80 L350,130 L350,170 L200,220 Z" fill="none" stroke="#0097c4" stroke-width="2" filter="url(#glow-blue)"/>
  <text x="275" y="155" fill="#0097c4" font-family="sans-serif" font-size="12" text-anchor="middle">Reduction</text>
  
  <!-- Right: Latent Space -->
  <text x="600" y="40" fill="#f5f9ff" font-family="sans-serif" font-size="14" text-anchor="middle" opacity="0.6">Latent Space (The "Sliders")</text>
  <g transform="translate(500,80)">
    <line x1="0" y1="150" x2="200" y2="150" stroke="#f5f9ff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="150" stroke="#f5f9ff" stroke-width="1" opacity="0.3"/>
    <text x="210" y="155" fill="#f5f9ff" font-family="sans-serif" font-size="10" opacity="0.5">Smile</text>
    <text x="-35" y="10" fill="#f5f9ff" font-family="sans-serif" font-size="10" opacity="0.5">Age</text>
    
    <circle cx="40" cy="110" r="6" fill="#ff9f1c" filter="url(#glow-blue)"/>
    <circle cx="140" cy="40" r="6" fill="#0097c4" filter="url(#glow-blue)"/>
    <circle cx="90" cy="80" r="6" fill="#0097c4" opacity="0.5"/>
  </g>
</svg>
