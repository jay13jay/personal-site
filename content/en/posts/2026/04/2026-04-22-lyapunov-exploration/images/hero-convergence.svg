<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#f85149" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#3fb950" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-starburst" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feFlood flood-color="#3fb950" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-dim" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Background gradient -->
    <radialGradient id="bg" cx="60%" cy="45%">
      <stop offset="0%" stop-color="#111a24"/>
      <stop offset="70%" stop-color="#0a0f16"/>
      <stop offset="100%" stop-color="#070a10"/>
    </radialGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f85149" stop-opacity="0.8"/>
      <stop offset="35%" stop-color="#f0883e"/>
      <stop offset="65%" stop-color="#388bfd"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>

    <!-- Stream gradient -->
    <linearGradient id="stream-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f85149" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#a371f7" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#388bfd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Starburst rays gradient -->
    <linearGradient id="ray-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="url(#bg)"/>

  <!-- Subtle grid dots for depth -->
  <g opacity="0.04" fill="#8b949e">
    <circle cx="50" cy="50" r="1"/><circle cx="100" cy="50" r="1"/><circle cx="150" cy="50" r="1"/>
    <circle cx="200" cy="50" r="1"/><circle cx="250" cy="50" r="1"/><circle cx="300" cy="50" r="1"/>
    <circle cx="350" cy="50" r="1"/><circle cx="400" cy="50" r="1"/><circle cx="450" cy="50" r="1"/>
    <circle cx="500" cy="50" r="1"/><circle cx="550" cy="50" r="1"/><circle cx="600" cy="50" r="1"/>
    <circle cx="650" cy="50" r="1"/><circle cx="700" cy="50" r="1"/><circle cx="750" cy="50" r="1"/>
    <circle cx="800" cy="50" r="1"/><circle cx="850" cy="50" r="1"/>
    <circle cx="50" cy="100" r="1"/><circle cx="100" cy="100" r="1"/><circle cx="150" cy="100" r="1"/>
    <circle cx="200" cy="100" r="1"/><circle cx="250" cy="100" r="1"/><circle cx="300" cy="100" r="1"/>
    <circle cx="350" cy="100" r="1"/><circle cx="400" cy="100" r="1"/><circle cx="450" cy="100" r="1"/>
    <circle cx="500" cy="100" r="1"/><circle cx="550" cy="100" r="1"/><circle cx="600" cy="100" r="1"/>
    <circle cx="650" cy="100" r="1"/><circle cx="700" cy="100" r="1"/><circle cx="750" cy="100" r="1"/>
    <circle cx="800" cy="100" r="1"/><circle cx="850" cy="100" r="1"/>
    <circle cx="50" cy="150" r="1"/><circle cx="100" cy="150" r="1"/><circle cx="150" cy="150" r="1"/>
    <circle cx="200" cy="150" r="1"/><circle cx="250" cy="150" r="1"/><circle cx="300" cy="150" r="1"/>
    <circle cx="350" cy="150" r="1"/><circle cx="400" cy="150" r="1"/><circle cx="450" cy="150" r="1"/>
    <circle cx="500" cy="150" r="1"/><circle cx="550" cy="150" r="1"/><circle cx="600" cy="150" r="1"/>
    <circle cx="650" cy="150" r="1"/><circle cx="700" cy="150" r="1"/><circle cx="750" cy="150" r="1"/>
    <circle cx="800" cy="150" r="1"/><circle cx="850" cy="150" r="1"/>
    <circle cx="50" cy="200" r="1"/><circle cx="100" cy="200" r="1"/><circle cx="150" cy="200" r="1"/>
    <circle cx="200" cy="200" r="1"/><circle cx="250" cy="200" r="1"/><circle cx="300" cy="200" r="1"/>
    <circle cx="350" cy="200" r="1"/><circle cx="400" cy="200" r="1"/><circle cx="450" cy="200" r="1"/>
    <circle cx="500" cy="200" r="1"/><circle cx="550" cy="200" r="1"/><circle cx="600" cy="200" r="1"/>
    <circle cx="650" cy="200" r="1"/><circle cx="700" cy="200" r="1"/><circle cx="750" cy="200" r="1"/>
    <circle cx="800" cy="200" r="1"/><circle cx="850" cy="200" r="1"/>
    <circle cx="50" cy="250" r="1"/><circle cx="100" cy="250" r="1"/><circle cx="150" cy="250" r="1"/>
    <circle cx="200" cy="250" r="1"/><circle cx="250" cy="250" r="1"/><circle cx="300" cy="250" r="1"/>
    <circle cx="350" cy="250" r="1"/><circle cx="400" cy="250" r="1"/><circle cx="450" cy="250" r="1"/>
    <circle cx="500" cy="250" r="1"/><circle cx="550" cy="250" r="1"/><circle cx="600" cy="250" r="1"/>
    <circle cx="650" cy="250" r="1"/><circle cx="700" cy="250" r="1"/><circle cx="750" cy="250" r="1"/>
    <circle cx="800" cy="250" r="1"/><circle cx="850" cy="250" r="1"/>
    <circle cx="50" cy="300" r="1"/><circle cx="100" cy="300" r="1"/><circle cx="150" cy="300" r="1"/>
    <circle cx="200" cy="300" r="1"/><circle cx="250" cy="300" r="1"/><circle cx="300" cy="300" r="1"/>
    <circle cx="350" cy="300" r="1"/><circle cx="400" cy="300" r="1"/><circle cx="450" cy="300" r="1"/>
    <circle cx="500" cy="300" r="1"/><circle cx="550" cy="300" r="1"/><circle cx="600" cy="300" r="1"/>
    <circle cx="650" cy="300" r="1"/><circle cx="700" cy="300" r="1"/><circle cx="750" cy="300" r="1"/>
    <circle cx="800" cy="300" r="1"/><circle cx="850" cy="300" r="1"/>
    <circle cx="50" cy="350" r="1"/><circle cx="100" cy="350" r="1"/><circle cx="150" cy="350" r="1"/>
    <circle cx="200" cy="350" r="1"/><circle cx="250" cy="350" r="1"/><circle cx="300" cy="350" r="1"/>
    <circle cx="350" cy="350" r="1"/><circle cx="400" cy="350" r="1"/><circle cx="450" cy="350" r="1"/>
    <circle cx="500" cy="350" r="1"/><circle cx="550" cy="350" r="1"/><circle cx="600" cy="350" r="1"/>
    <circle cx="650" cy="350" r="1"/><circle cx="700" cy="350" r="1"/><circle cx="750" cy="350" r="1"/>
    <circle cx="800" cy="350" r="1"/><circle cx="850" cy="350" r="1"/>
  </g>

  <!-- Scattered binary digits — chaotic 0s on the left, orderly 1s on the right -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace" font-size="13">
    <!-- Left zone: dim red 0s, scattered randomly -->
    <text x="32" y="72" fill="#f85149" opacity="0.10" transform="rotate(-12, 32, 72)">0</text>
    <text x="95" y="45" fill="#f85149" opacity="0.08">0</text>
    <text x="68" y="138" fill="#f85149" opacity="0.12" transform="rotate(8, 68, 138)">0</text>
    <text x="145" y="98" fill="#f85149" opacity="0.07" transform="rotate(-5, 145, 98)">0</text>
    <text x="38" y="210" fill="#f85149" opacity="0.11">0</text>
    <text x="110" y="178" fill="#f85149" opacity="0.09" transform="rotate(15, 110, 178)">0</text>
    <text x="78" y="268" fill="#f0883e" opacity="0.08" transform="rotate(-8, 78, 268)">0</text>
    <text x="155" y="235" fill="#f85149" opacity="0.10">0</text>
    <text x="42" y="322" fill="#f85149" opacity="0.07" transform="rotate(11, 42, 322)">0</text>
    <text x="128" y="348" fill="#f0883e" opacity="0.09">0</text>
    <text x="88" y="370" fill="#f85149" opacity="0.06" transform="rotate(-6, 88, 370)">0</text>
    <text x="168" y="310" fill="#f85149" opacity="0.08">0</text>
    <text x="52" y="155" fill="#f0883e" opacity="0.11" transform="rotate(4, 52, 155)">0</text>
    <text x="135" y="55" fill="#f85149" opacity="0.06">0</text>
    <!-- Transition zone: mix -->
    <text x="310" y="88" fill="#a371f7" opacity="0.08">0</text>
    <text x="345" y="142" fill="#a371f7" opacity="0.09">1</text>
    <text x="330" y="268" fill="#388bfd" opacity="0.07">0</text>
    <text x="365" y="325" fill="#388bfd" opacity="0.08">1</text>
    <text x="380" y="62" fill="#a371f7" opacity="0.06">1</text>
    <text x="355" y="195" fill="#388bfd" opacity="0.07">1</text>
    <!-- Right zone: brighter green 1s, more orderly -->
    <text x="735" y="65" fill="#3fb950" opacity="0.12">1</text>
    <text x="770" y="98" fill="#3fb950" opacity="0.14">1</text>
    <text x="800" y="55" fill="#3fb950" opacity="0.10">1</text>
    <text x="748" y="135" fill="#3fb950" opacity="0.11">1</text>
    <text x="820" y="128" fill="#3fb950" opacity="0.13">1</text>
    <text x="855" y="78" fill="#3fb950" opacity="0.09">1</text>
    <text x="730" y="260" fill="#3fb950" opacity="0.13">1</text>
    <text x="780" y="285" fill="#3fb950" opacity="0.15">1</text>
    <text x="815" y="255" fill="#3fb950" opacity="0.11">1</text>
    <text x="850" y="290" fill="#3fb950" opacity="0.10">1</text>
    <text x="745" y="330" fill="#3fb950" opacity="0.12">1</text>
    <text x="795" y="350" fill="#3fb950" opacity="0.14">1</text>
    <text x="840" y="340" fill="#3fb950" opacity="0.09">1</text>
    <text x="860" y="195" fill="#3fb950" opacity="0.10">1</text>
    <text x="725" y="195" fill="#3fb950" opacity="0.08">1</text>
  </g>

  <!-- Converging stream lines from left chaos to right order -->
  <g fill="none" stroke-width="1.2" opacity="0.18">
    <path d="M60,120 C180,115 280,160 400,185 S520,195 580,192 S660,180 700,175"
          stroke="url(#stream-grad)" stroke-dasharray="4 6"/>
    <path d="M40,200 C160,210 260,195 400,195 S520,200 580,198 S660,195 700,192"
          stroke="url(#stream-grad)" stroke-dasharray="3 5"/>
    <path d="M70,280 C180,270 280,235 400,210 S520,200 580,198 S660,198 700,200"
          stroke="url(#stream-grad)" stroke-dasharray="5 7"/>
    <path d="M50,340 C170,320 280,260 400,220 S520,205 580,200 S660,200 700,202"
          stroke="url(#stream-grad)" stroke-dasharray="3 8"/>
    <path d="M80,65 C180,80 280,140 400,178 S520,192 580,190 S660,185 700,180"
          stroke="url(#stream-grad)" stroke-dasharray="6 5"/>
  </g>

  <!-- ============ INFINITY SYMBOL (chaotic, left side) ============ -->
  <g filter="url(#glow-red)" transform="translate(195, 195)">
    <!-- Primary infinity curve -->
    <path d="M-90,0 C-90,-55 -30,-55 0,0 C30,55 90,55 90,0 C90,-55 30,-55 0,0 C-30,55 -90,55 -90,0Z"
          fill="none" stroke="#f85149" stroke-width="5" stroke-linecap="round"/>
    <!-- Chaotic overlay 1 — slightly displaced -->
    <path d="M-92,3 C-87,-52 -32,-58 2,-2 C32,53 88,50 87,-3 C87,-56 32,-50 -2,3 C-32,58 -88,52 -92,3Z"
          fill="none" stroke="#f0883e" stroke-width="3" opacity="0.45"/>
    <!-- Chaotic overlay 2 — more displaced -->
    <path d="M-87,-4 C-93,-58 -28,-50 -3,4 C27,52 92,58 93,2 C93,-50 28,-58 3,-4 C-27,52 -92,58 -87,-4Z"
          fill="none" stroke="#f85149" stroke-width="2" opacity="0.25"/>
    <!-- Chaotic overlay 3 — thin flicker -->
    <path d="M-85,6 C-85,-48 -35,-60 5,0 C35,60 85,48 85,-6 C85,-60 35,-48 -5,0 C-35,48 -85,60 -85,6Z"
          fill="none" stroke="#d63a35" stroke-width="1.2" opacity="0.20"/>
    <!-- Small chaotic sparks/fragments around the infinity -->
    <circle cx="-95" cy="-8" r="2" fill="#f85149" opacity="0.3"/>
    <circle cx="98" cy="5" r="1.5" fill="#f0883e" opacity="0.25"/>
    <circle cx="-70" cy="-48" r="1.5" fill="#f85149" opacity="0.2"/>
    <circle cx="72" cy="50" r="2" fill="#f0883e" opacity="0.22"/>
    <circle cx="-40" cy="55" r="1" fill="#f85149" opacity="0.18"/>
    <circle cx="45" cy="-52" r="1.8" fill="#d63a35" opacity="0.2"/>
    <circle cx="0" cy="-4" r="2.5" fill="#f85149" opacity="0.15"/>
    <circle cx="-60" cy="40" r="1.2" fill="#f0883e" opacity="0.15"/>
    <circle cx="65" cy="-38" r="1.3" fill="#f85149" opacity="0.17"/>
  </g>

  <!-- ============ ARROW (gradient transition) ============ -->
  <g filter="url(#glow-soft)">
    <!-- Arrow shaft — sweeping curve with gradient -->
    <path d="M340,195 C380,195 420,195 490,195"
          fill="none" stroke="url(#arrow-grad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="500,195 482,182 482,208" fill="#3fb950" opacity="0.9"/>
    <!-- Thin parallel trace lines for depth -->
    <path d="M350,186 C390,186 430,187 480,188"
          fill="none" stroke="url(#arrow-grad)" stroke-width="0.8" opacity="0.3"/>
    <path d="M350,204 C390,204 430,203 480,202"
          fill="none" stroke="url(#arrow-grad)" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Mathematical annotations along arrow -->
  <g font-family="'Georgia', 'Times New Roman', serif" font-style="italic" font-size="13" opacity="0.3">
    <text x="395" y="178" fill="#8b949e">monotonic</text>
    <text x="402" y="222" fill="#8b949e">φ(s) ↓ 0</text>
  </g>

  <!-- ============ CHECKMARK (precise, right side) ============ -->
  <!-- Starburst rays behind checkmark -->
  <g opacity="0.12" transform="translate(680, 190)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#3fb950" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="95" y2="32" stroke="#3fb950" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="81" y2="59" stroke="#3fb950" stroke-width="1"/>
    <line x1="0" y1="0" x2="59" y2="81" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="32" y2="95" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="100" stroke="#3fb950" stroke-width="1"/>
    <line x1="0" y1="0" x2="-32" y2="95" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="-59" y2="81" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="-81" y2="59" stroke="#3fb950" stroke-width="1"/>
    <line x1="0" y1="0" x2="-95" y2="32" stroke="#3fb950" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="-100" y2="0" stroke="#3fb950" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-95" y2="-32" stroke="#3fb950" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="-81" y2="-59" stroke="#3fb950" stroke-width="1"/>
    <line x1="0" y1="0" x2="-59" y2="-81" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="-32" y2="-95" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="-100" stroke="#3fb950" stroke-width="1"/>
    <line x1="0" y1="0" x2="32" y2="-95" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="59" y2="-81" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="81" y2="-59" stroke="#3fb950" stroke-width="1"/>
    <line x1="0" y1="0" x2="95" y2="-32" stroke="#3fb950" stroke-width="1.2"/>
  </g>

  <!-- Starburst glow disc -->
  <circle cx="680" cy="190" r="55" fill="#3fb950" opacity="0.04" filter="url(#glow-starburst)"/>

  <!-- The checkmark itself -->
  <g filter="url(#glow-green)" transform="translate(680, 190)">
    <path d="M-45,8 L-12,42 L55,-45"
          fill="none" stroke="#3fb950" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Six dimension indicators around the checkmark (all lit) -->
  <g filter="url(#glow-dim)">
    <circle cx="680" cy="115" r="5" fill="#3fb950" opacity="0.85"/>
    <circle cx="730" cy="138" r="5" fill="#3fb950" opacity="0.85"/>
    <circle cx="740" cy="195" r="5" fill="#3fb950" opacity="0.85"/>
    <circle cx="718" cy="250" r="5" fill="#3fb950" opacity="0.85"/>
    <circle cx="665" cy="260" r="5" fill="#3fb950" opacity="0.85"/>
    <circle cx="625" cy="230" r="5" fill="#3fb950" opacity="0.85"/>
    <!-- Subtle connecting arc through the indicators -->
    <ellipse cx="680" cy="190" rx="68" ry="78" fill="none" stroke="#3fb950"
             stroke-width="0.6" opacity="0.15" stroke-dasharray="3 6"/>
  </g>

  <!-- Dimension labels (tiny, subtle) -->
  <g font-family="'JetBrains Mono', 'Consolas', monospace" font-size="7" fill="#3fb950" opacity="0.35">
    <text x="668" y="108" text-anchor="middle">D1</text>
    <text x="744" y="135" text-anchor="middle">D2</text>
    <text x="754" y="198" text-anchor="middle">D3</text>
    <text x="732" y="264" text-anchor="middle">D4</text>
    <text x="653" y="274" text-anchor="middle">D5</text>
    <text x="613" y="236" text-anchor="middle">D6</text>
  </g>

  <!-- Bottom caption strip -->
  <g font-family="'JetBrains Mono', 'Consolas', monospace">
    <!-- Left label -->
    <text x="195" y="310" text-anchor="middle" font-size="10" fill="#f85149" opacity="0.35"
          letter-spacing="3">UNBOUNDED</text>
    <!-- Binary under infinity -->
    <text x="195" y="328" text-anchor="middle" font-size="11" fill="#f85149" opacity="0.20"
          letter-spacing="4">000000</text>
    <!-- Right label -->
    <text x="680" y="310" text-anchor="middle" font-size="10" fill="#3fb950" opacity="0.45"
          letter-spacing="3">CONVERGED</text>
    <!-- Binary under checkmark -->
    <text x="680" y="328" text-anchor="middle" font-size="11" fill="#3fb950" opacity="0.30"
          letter-spacing="4">111111</text>
  </g>

  <!-- Faint mathematical context at top -->
  <g font-family="'Georgia', 'Times New Roman', serif" font-style="italic" font-size="11" opacity="0.18">
    <text x="195" y="370" text-anchor="middle" fill="#8b949e">E[T] = ∞</text>
    <text x="680" y="370" text-anchor="middle" fill="#8b949e">E[T] ≤ n / p_min</text>
  </g>
</svg>
