<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#388bfd"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#388bfd20"/>
      <stop offset="100%" style="stop-color:#3fb95010"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="440" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Lyapunov Descent: φ(s) = Uncovered Properties Over Time</text>
  <text x="360" y="56" text-anchor="middle" fill="#8b949e" font-size="12">Non-negative, non-increasing, with strictly negative expected drift → must reach zero</text>

  <!-- Chart area -->
  <g transform="translate(90, 75)">
    <!-- Grid lines -->
    <g stroke="#21262d" stroke-width="1">
      <line x1="0" y1="0" x2="560" y2="0"/>
      <line x1="0" y1="37.5" x2="560" y2="37.5"/>
      <line x1="0" y1="75" x2="560" y2="75"/>
      <line x1="0" y1="112.5" x2="560" y2="112.5"/>
      <line x1="0" y1="150" x2="560" y2="150"/>
      <line x1="0" y1="187.5" x2="560" y2="187.5"/>
      <line x1="0" y1="225" x2="560" y2="225"/>
      <line x1="0" y1="262.5" x2="560" y2="262.5"/>
      <line x1="0" y1="300" x2="560" y2="300"/>
    </g>

    <!-- Y-axis labels -->
    <text x="-10" y="5" text-anchor="end" fill="#8b949e" font-size="10">8</text>
    <text x="-10" y="42" text-anchor="end" fill="#8b949e" font-size="10">7</text>
    <text x="-10" y="80" text-anchor="end" fill="#8b949e" font-size="10">6</text>
    <text x="-10" y="117" text-anchor="end" fill="#8b949e" font-size="10">5</text>
    <text x="-10" y="155" text-anchor="end" fill="#8b949e" font-size="10">4</text>
    <text x="-10" y="192" text-anchor="end" fill="#8b949e" font-size="10">3</text>
    <text x="-10" y="230" text-anchor="end" fill="#8b949e" font-size="10">2</text>
    <text x="-10" y="267" text-anchor="end" fill="#8b949e" font-size="10">1</text>
    <text x="-10" y="305" text-anchor="end" fill="#3fb950" font-size="10" font-weight="bold">0</text>

    <!-- Y-axis title -->
    <text x="-55" y="150" text-anchor="middle" fill="#8b949e" font-size="11" transform="rotate(-90,-55,150)">φ(s) = uncovered</text>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#30363d" stroke-width="2"/>
    <line x1="0" y1="300" x2="560" y2="300" stroke="#30363d" stroke-width="2"/>

    <!-- X-axis labels -->
    <text x="0" y="320" text-anchor="middle" fill="#8b949e" font-size="10">0</text>
    <text x="56" y="320" text-anchor="middle" fill="#8b949e" font-size="10">3</text>
    <text x="112" y="320" text-anchor="middle" fill="#8b949e" font-size="10">6</text>
    <text x="168" y="320" text-anchor="middle" fill="#8b949e" font-size="10">9</text>
    <text x="224" y="320" text-anchor="middle" fill="#8b949e" font-size="10">12</text>
    <text x="280" y="320" text-anchor="middle" fill="#8b949e" font-size="10">15</text>
    <text x="336" y="320" text-anchor="middle" fill="#8b949e" font-size="10">18</text>
    <text x="392" y="320" text-anchor="middle" fill="#8b949e" font-size="10">21</text>
    <text x="448" y="320" text-anchor="middle" fill="#8b949e" font-size="10">24</text>
    <text x="504" y="320" text-anchor="middle" fill="#8b949e" font-size="10">27</text>
    <text x="280" y="340" text-anchor="middle" fill="#8b949e" font-size="11">Iteration (t)</text>

    <!-- Fill area under curve -->
    <polygon points="0,0 0,0 19,0 38,0 56,0 75,37.5 93,37.5 112,37.5 130,75 150,75 168,112.5 187,112.5 205,150 224,150 242,150 261,187.5 280,187.5 298,225 317,225 336,225 355,262.5 373,262.5 392,262.5 410,262.5 430,262.5 448,300 448,300 0,300"
      fill="url(#fillGrad)" opacity="0.4"/>

    <!-- The staircase descent line (realistic: stalls + advances) -->
    <g filter="url(#glow3)">
      <polyline points="0,0 19,0 38,0 56,0 75,37.5 93,37.5 112,37.5 130,75 150,75 168,112.5 187,112.5 205,150 224,150 242,150 261,187.5 280,187.5 298,225 317,225 336,225 355,262.5 373,262.5 392,262.5 410,262.5 430,262.5 448,300"
        fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    </g>

    <!-- Expected bound line (dashed) -->
    <line x1="0" y1="0" x2="504" y2="300" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
    <text x="510" y="298" fill="#f0883e" font-size="10">E[T] = n/p</text>

    <!-- Key moments annotations -->
    <!-- Stall annotation -->
    <rect x="220" y="132" width="70" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="255" y="146" text-anchor="middle" fill="#f0883e" font-size="9">stall (φ flat)</text>

    <!-- Advance annotation -->
    <g>
      <line x1="75" y1="15" x2="75" y2="35" stroke="#3fb950" stroke-width="1.5"/>
      <text x="88" y="20" fill="#3fb950" font-size="9">advance!</text>
    </g>

    <!-- Goal reached -->
    <g filter="url(#glow3)">
      <circle cx="448" cy="300" r="6" fill="#3fb950" stroke="#3fb950" stroke-width="1"/>
    </g>
    <text x="460" y="296" fill="#3fb950" font-size="10" font-weight="bold">Done ✓</text>
    <text x="460" y="308" fill="#8b949e" font-size="9">t = 24 steps</text>
  </g>

  <!-- Bottom annotations -->
  <g transform="translate(90, 415)">
    <circle cx="0" cy="0" r="4" fill="#388bfd"/>
    <text x="10" y="4" fill="#8b949e" font-size="10">Actual trajectory (stalls are flat, advances are drops)</text>
  </g>
  <g transform="translate(90, 432)">
    <line x1="-4" y1="0" x2="8" y2="0" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="14" y="4" fill="#8b949e" font-size="10">Expected bound E[T] ≤ n/p_min = 8/0.3 ≈ 27 (orange dashed)</text>
  </g>
</svg>
