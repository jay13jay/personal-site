<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="plannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <linearGradient id="explorerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="criticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#f85149"/>
    </linearGradient>
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="580" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Kerrigan Recursion Engine: The MDP Tick Loop</text>
  <text x="360" y="58" text-anchor="middle" fill="#8b949e" font-size="12">Controller is the only component with loop authority. Agents are stateless.</text>

  <!-- Coverage State Box (top center) -->
  <rect x="240" y="80" width="240" height="50" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="360" y="100" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Coverage State s</text>
  <text x="360" y="118" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="monospace">[ 1, 1, 0, 0, 1, 0, 0, 1 ]</text>

  <!-- Planner -->
  <g filter="url(#glow2)">
    <rect x="80" y="185" width="160" height="65" rx="10" fill="url(#plannerGrad)" stroke="#388bfd" stroke-width="1.5"/>
    <text x="160" y="212" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Planner</text>
    <text x="160" y="232" text-anchor="middle" fill="#c8d1d9" font-size="10">"Target dimension 3"</text>
  </g>

  <!-- Explorer -->
  <g filter="url(#glow2)">
    <rect x="280" y="295" width="160" height="65" rx="10" fill="url(#explorerGrad)" stroke="#a371f7" stroke-width="1.5"/>
    <text x="360" y="322" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Explorer</text>
    <text x="360" y="342" text-anchor="middle" fill="#c8d1d9" font-size="10">LLM generates draft</text>
  </g>

  <!-- Critic -->
  <g filter="url(#glow2)">
    <rect x="480" y="185" width="160" height="65" rx="10" fill="url(#criticGrad)" stroke="#f85149" stroke-width="1.5"/>
    <text x="560" y="212" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Critic</text>
    <text x="560" y="232" text-anchor="middle" fill="#c8d1d9" font-size="10">Deterministic check</text>
  </g>

  <!-- Controller (center) -->
  <g filter="url(#glow2)">
    <rect x="280" y="420" width="160" height="65" rx="10" fill="url(#controllerGrad)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="360" y="447" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Controller</text>
    <text x="360" y="465" text-anchor="middle" fill="#c8d1d9" font-size="10">s = s OR s' (bitwise)</text>
  </g>

  <!-- Flow arrows -->
  <g fill="none" stroke-width="2">
    <!-- State → Planner -->
    <path d="M 270 105 Q 200 105 200 185" stroke="#8b949e" marker-end="url(#arrowWhite)"/>
    <text x="195" y="148" text-anchor="end" fill="#8b949e" font-size="10">① Read</text>

    <!-- Planner → Explorer -->
    <path d="M 220 250 Q 260 280 300 310" stroke="#8b949e" marker-end="url(#arrowWhite)"/>
    <text x="235" y="290" fill="#8b949e" font-size="10">② Target</text>

    <!-- Explorer → Critic -->
    <path d="M 430 310 Q 510 280 530 250" stroke="#8b949e" marker-end="url(#arrowWhite)"/>
    <text x="505" y="290" fill="#8b949e" font-size="10">③ Draft</text>

    <!-- Critic → Controller -->
    <path d="M 560 250 Q 560 370 430 440" stroke="#8b949e" marker-end="url(#arrowWhite)"/>
    <text x="530" y="365" fill="#8b949e" font-size="10">④ New state s'</text>

    <!-- Controller → State (loop back) -->
    <path d="M 360 420 Q 360 393 360 130" stroke="#3fb950" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
    <text x="375" y="393" fill="#3fb950" font-size="10">⑤ Update &amp; loop</text>
  </g>

  <!-- Goal check -->
  <g>
    <rect x="510" y="430" width="180" height="44" rx="8" fill="#21262d" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="600" y="448" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">s == goal?</text>
    <text x="600" y="465" text-anchor="middle" fill="#8b949e" font-size="10">If yes → emit result</text>
  </g>
  <line x1="440" y1="452" x2="510" y2="452" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Invariant callout -->
  <rect x="38" y="420" width="210" height="65" rx="8" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="143" y="442" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">Monotonicity Invariant</text>
  <text x="143" y="460" text-anchor="middle" fill="#8b949e" font-size="10">Bits only flip 0 → 1</text>
  <text x="143" y="476" text-anchor="middle" fill="#8b949e" font-size="10">Progress never reverses</text>

  <!-- Bottom note -->
  <text x="360" y="520" text-anchor="middle" fill="#8b949e" font-size="11">Hard bounds: max 5 recursion depths × 3 beams per tick = provably finite</text>
  <text x="360" y="540" text-anchor="middle" fill="#8b949e" font-size="11">All LLM inference is local (cluster GPU). Zero external PHI egress.</text>
  <text x="360" y="560" text-anchor="middle" fill="#484f58" font-size="10">coalescent-emergence.github.io</text>
</svg>
