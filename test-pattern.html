<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #000; color: white; padding: 50px; font-family: sans-serif; }
  .sacred-card {
    background: rgba(1, 22, 39, 0.8);
    border: 1px solid rgba(0, 151, 196, 0.35);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    z-index: 1;
    width: 300px;
    height: 200px;
  }
  .sacred-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    z-index: -1;
    background-image: 
      repeating-radial-gradient(circle at 0 0, transparent 0, rgba(0, 151, 196, 0.5) 10px, transparent 11px, transparent 22px),
      repeating-radial-gradient(circle at 100% 0, transparent 0, rgba(0, 151, 196, 0.5) 10px, transparent 11px, transparent 22px),
      repeating-radial-gradient(circle at 0 100%, transparent 0, rgba(0, 151, 196, 0.5) 10px, transparent 11px, transparent 22px),
      repeating-radial-gradient(circle at 100% 100%, transparent 0, rgba(0, 151, 196, 0.5) 10px, transparent 11px, transparent 22px);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,1) 80%);
    mask-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,1) 80%);
  }
</style>
</head>
<body>
  <div class="sacred-card">
    <h2>Hello World</h2>
    <p>This is a test card.</p>
  </div>
</body>
</html>
