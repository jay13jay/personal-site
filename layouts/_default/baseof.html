<!DOCTYPE html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
        
        <!-- Favicon here-->
        <link rel="apple-touch-icon" sizes="180x180" href="{{ .Site.BaseURL }}favicon_io/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="{{ .Site.BaseURL }}favicon_io/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="{{ .Site.BaseURL }}favicon_io/favicon-16x16.png">
        <link rel="manifest" href="{{ .Site.BaseURL }}favicon_io/site.webmanifest">        
        <link rel="preload" href="https://cdn.tailwindcss.com" as="script">
        <link rel="preload" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" as="style">            
        <style>
            html, body {
                background-color: #011627;
                color: #f5f9ff;
                /* Layered radial gradients give the backdrop-filter blur tangible
                   depth — without them the frosted glass effect is invisible. */
                background-image:
                    radial-gradient(ellipse 80% 50% at 20% 10%,  rgba(0,126,167,0.14) 0%, transparent 70%),
                    radial-gradient(ellipse 60% 40% at 80% 80%,  rgba(0,126,167,0.10) 0%, transparent 70%),
                    radial-gradient(ellipse 40% 60% at 50% 40%,  rgba(1, 34, 58, 0.9) 0%, transparent 100%);
                background-attachment: fixed;
            }
            .border {
                border-color: rgba(0, 126, 167, 0.25);
            }
            .carousel-item {
                display: none;
            }
            .carousel-item.active {
                display: block;
            }
        </style>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: 'class',
                theme: {
                    extend: {
                        colors: {
                            'bg-primary-dark': '#011627',
                            'bg-secondary-dark': '#021b2e',
                            'bg-tertiary-dark': '#03233a',
                            'text-primary-dark': '#f5f9ff',
                            'text-secondary-dark': 'rgba(245, 249, 255, 0.6)',
                            'border-primary-dark': 'rgba(0, 126, 167, 0.35)',
                            'border-secondary-dark': 'rgba(0, 126, 167, 0.25)',
                            'accent-dark': '#007ea7',
                            /* Tokens used in partials */
                            'cerulean': '#007ea7',
                            'cerulean-border': 'rgba(0, 126, 167, 0.25)',
                            'amber': '#ff9f1c',
                            'light': '#f5f9ff'
                        }
                    }
                }
            }
        </script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
        {{ $css := resources.Get "css/custom.css" }}
        {{ with $css }}<link rel="stylesheet" href="{{ .RelPermalink }}">{{ end }}
    </head>
    <body class="flex flex-col min-h-screen bg-bg-primary-dark transition-colors duration-300">
        {{ partial "header.html" . }}
        <main class="flex-grow container mx-auto px-4 py-8 specular-overlay">
            {{ block "main" . }}{{ end }}
        </main>
        {{ partial "footer.html" . }}
    </body>
</html>
