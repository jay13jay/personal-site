name: Refresh GitHub Data

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh data/en/github.toml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/refresh_github_data.py --user jay13jay --out data/en/github.toml

      - name: Commit changes if needed
        run: |
          if git diff --quiet -- data/en/github.toml; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/en/github.toml
          git commit -m "chore(data): refresh github public profile data"
          git push
